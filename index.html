const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

function freqToNote(freq) {
  if (freq < 60 || freq > 1200) return null;
  const midi = Math.round(12 * Math.log2(freq / 440) + 69);
  const name = NOTE_NAMES[midi % 12];
  const octave = Math.floor(midi / 12) - 1;
  const hz = 440 * Math.pow(2, (midi - 69) / 12);
  const cents = Math.round(1200 * Math.log2(freq / hz));
  return { name: name + octave, cents };
}

function autoCorrelate(buf, sr) {
  const N = buf.length, MAX = Math.floor(N / 2);
  let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i] * buf[i];
  if (Math.sqrt(rms / N) < 0.01) return -1;
  let best = -1, bestC = 0, lastC = 1;
  for (let o = 0; o < MAX; o++) {
    let c = 0;
    for (let i = 0; i < MAX; i++) c += Math.abs(buf[i] - buf[i + o]);
    c = 1 - c / MAX;
    if (c > 0.9 && c > lastC && c > bestC) { bestC = c; best = o; }
    lastC = c;
  }
  return best > 0 && bestC > 0.01 ? sr / best : -1;
}

function ChordDiagram({ name }) {
  const sh = CHORDS[name];
  if (!sh) return null;
  const NX=8, NG=14, NS=6, NF=4, NY=18, FH=16;
  const W = NX*2 + NG*(NS-1), H = NY + FH*NF + 8;
  return (
    <div style={{textAlign:"center"}}>
      <div style={{color:C.amber,fontWeight:700,fontSize:16,marginBottom:8}}>{name}</div>
      <svg width={W} height={H}>
        <rect x={NX} y={NY-3} width={NG*(NS-1)} height={3} fill={C.text}/>
        {Array.from({length:NF+1},(_,f)=>(
          <line key={f} x1={NX} y1={NY+f*FH} x2={NX+NG*(NS-1)} y2={NY+f*FH} stroke={C.fret} strokeWidth={1}/>
        ))}
        {Array.from({length:NS},(_,s)=>(
          <line key={s} x1={NX+s*NG} y1={NY} x2={NX+s*NG} y2={NY+NF*FH} stroke={C.string} strokeWidth={1}/>
        ))}
        {sh.dots.map(({s,f,n},i)=>{
          const cx=NX+s*NG, cy=NY+(f-0.5)*FH;
          return (
            <g key={i}>
              <circle cx={cx} cy={cy} r={6} fill={C.amber}/>
              <text x={cx} y={cy+4} textAnchor="middle" fontSize={8} fill="#1A1A1F">{n}</text>
            </g>
          );
        })}
        {sh.open.map(s=>(
          <circle key={s} cx={NX+s*NG} cy={NY-9} r={4} fill="none" stroke={C.sage} strokeWidth={1.5}/>
        ))}
        {sh.muted.map(s=>{
          const cx=NX+s*NG;
          return (
            <g key={s}>
              <line x1={cx-4} y1={NY-13} x2={cx+4} y2={NY-5} stroke={C.coral} strokeWidth={1.5}/>
              <line x1={cx+4} y1={NY-13} x2={cx-4} y2={NY-5} stroke={C.coral} strokeWidth={1.5}/>
            </g>
          );
        })}
      </svg>
      <div style={{fontFamily:"monospace",fontSize:10,color:C.muted,marginTop:6}}>{sh.label}</div>
    </div>
  );
}

const ENCOURAGEMENTS = ["Great job!","You nailed it!","Awesome!","Nicely done!","Keep it up!","Sounding good!","That was perfect!","You rock!"];

function SongPlayer({ parts, detected, listening, onStartMic }) {
  const [partIdx, setPartIdx] = useState(0);
  const [active, setActive] = useState(false);
  const [noteIdx, setNoteIdx] = useState(0);
  const [dotStates, setDotStates] = useState({});
  const [done, setDone] = useState(false);
  const [encouragement, setEncouragement] = useState("");
  const timerRef = useRef(null);

  const allParts = parts || [];
  const currentPart = allParts[partIdx] || {};
  const currentNotes = currentPart.notes || [];

  // Build a flat sequence: [{partIdx, noteIdx, note}]
  const sequence = allParts.flatMap((p,pi)=>
    (p.notes||[]).map((note,ni)=>({pi, ni, note}))
  );

  const [seqIdx, setSeqIdx] = useState(0);

  const stop = useCallback(()=>{
    setActive(false);
    if(timerRef.current) clearTimeout(timerRef.current);
    setSeqIdx(0); setNoteIdx(0); setPartIdx(0);
    setDotStates({}); setDone(false); setEncouragement("");
  },[]);

  const advance = useCallback((si, seq)=>{
    if(si >= seq.length){
      setActive(false);
      setDone(true);
      setEncouragement(ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]);
      return;
    }
    const {pi, ni, note} = seq[si];
    setSeqIdx(si);
    setPartIdx(pi);
    setNoteIdx(ni);
    setDotStates(s=>({...s,[pi+"-"+ni]:"cur"}));
  },[]);

  const start = useCallback(()=>{
    stop();
    if(!listening && onStartMic) onStartMic();
    setTimeout(()=>{
      setActive(true);
      setDone(false);
      setDotStates({});
      advance(0, sequence);
    }, 300);
  },[sequence, stop, advance, listening, onStartMic]);

  useEffect(()=>{
    if(!active || !detected) return;
    const cur = sequence[seqIdx];
    if(!cur) return;
    if(detected === cur.note){
      if(timerRef.current) clearTimeout(timerRef.current);
      setDotStates(s=>({...s,[cur.pi+"-"+cur.ni]:"hit"}));
      setTimeout(()=>advance(seqIdx+1, sequence), 400);
    }
  },[detected, active, seqIdx, sequence, advance]);

  useEffect(()=>()=>{ if(timerRef.current) clearTimeout(timerRef.current); },[]);

  const NUM_FRETS=6, NS=6, W=320, H=260;
  const TOP=44, BOT=H-24, LEFT=44, RIGHT=W-12;
  const strGap=(BOT-TOP)/(NS-1);
  const fretGap=(RIGHT-LEFT)/NUM_FRETS;

  const renderFretboard = (pIdx) => {
    const pNotes = (allParts[pIdx]||{}).notes||[];
    return (
      <svg width={W} height={H} style={{display:"block",margin:"0 auto"}}>
        <line x1={LEFT} y1={TOP-2} x2={LEFT} y2={BOT+2} stroke={C.text} strokeWidth={3}/>
        {Array.from({length:NUM_FRETS+1},(_,f)=>(
          <line key={f} x1={LEFT+f*fretGap} y1={TOP} x2={LEFT+f*fretGap} y2={BOT} stroke={C.fret} strokeWidth={1}/>
        ))}
        {Array.from({length:NS},(_,s)=>(
          <line key={s} x1={LEFT} y1={TOP+s*strGap} x2={RIGHT} y2={TOP+s*strGap}
            stroke={C.string} strokeWidth={s===0?0.8:s===5?2:1.2}/>
        ))}
        {STRING_NAMES.map((n,s)=>(
          <text key={s} x={LEFT-10} y={TOP+s*strGap+4} textAnchor="middle"
            fontSize={10} fill={C.amber} fontFamily="monospace" fontWeight="600">{n}</text>
        ))}
        {Array.from({length:NUM_FRETS},(_,f)=>(
          <text key={f} x={LEFT+(f+0.5)*fretGap} y={BOT+16} textAnchor="middle"
            fontSize={9} fill={C.muted} fontFamily="monospace">{f+1}</text>
        ))}
        {pNotes.map((note,ni)=>{
          const p = NOTE_FRET_MAP[note];
          if(!p) return null;
          const isOpen = p.fret===0;
          const baseX = isOpen ? LEFT+0.5*fretGap : LEFT+(p.fret-0.5)*fretGap;
          const baseY = TOP+p.str*strGap;
          const sameSpot = pNotes.slice(0,ni).filter(n2=>{
            const q=NOTE_FRET_MAP[n2]; return q&&q.fret===p.fret&&q.str===p.str;
          }).length;
          const cx = baseX + sameSpot*32;
          const cy = baseY;
          const stateKey = pIdx+"-"+ni;
          const state = dotStates[stateKey];
          const isCur = active && state==="cur";
          const isHit = state==="hit";
          const isMiss = state==="miss";
          const fill = isHit?C.sage:isMiss?C.coral:isCur?C.amber:C.amber;
          const opacity = isHit||isCur||isMiss?1:0.7;
          return (
            <g key={ni}>
              <circle cx={cx} cy={cy} r={18} fill={isHit?"rgba(107,143,110,0.15)":isCur?"rgba(212,168,71,0.2)":"rgba(212,168,71,0.12)"}/>
              <circle cx={cx} cy={cy} r={14}
                fill={isOpen?(isHit?C.sage:isCur?C.amber:"transparent"):fill}
                stroke={isOpen?(isHit?C.sage:isCur?C.amber:C.amber):"none"}
                strokeWidth={isOpen?2.5:0}
                opacity={opacity}/>
              <text x={cx} y={cy+5} textAnchor="middle" fontSize={14}
                fill={isOpen?(isHit?"#1A1A1F":isCur?"#1A1A1F":C.amber):"#1A1A1F"}
                fontWeight="900" fontFamily="monospace">
                {ni+1}
              </text>
              {isCur && (
                <text x={cx} y={cy-24} textAnchor="middle" fontSize={20}>🎸</text>
              )}
            </g>
          );
        })}
      </svg>
    );
  };

  return (
    <div style={{marginBottom:16}}>
      {allParts.length > 1 && (
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {allParts.map((p,i)=>(
            <button key={i} onClick={()=>!active&&setPartIdx(i)}
              style={{padding:"3px 12px",borderRadius:14,fontSize:11,fontWeight:600,
                cursor:active?"default":"pointer",fontFamily:"sans-serif",
                border:"1px solid "+(i===partIdx?C.amber:C.fret),
                background:i===partIdx?"rgba(212,168,71,0.1)":"transparent",
                color:i===partIdx?C.amber:C.muted}}>
              {p.name}
            </button>
          ))}
        </div>
      )}
      {allParts.length===1 && (
        <div style={{fontSize:11,fontWeight:600,letterSpacing:"1.5px",textTransform:"uppercase",
          color:C.amber,marginBottom:10}}>{currentPart.name}</div>
      )}

      <div style={{background:"#0A0A0E",borderRadius:10,padding:"10px 6px",border:"1px solid "+(active?"rgba(212,168,71,0.3)":C.fret),overflowX:"auto",
        transition:"border-color 0.3s"}}>
        {renderFretboard(partIdx)}
        {currentNotes.length > 0 && (
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginTop:4,padding:"0 8px"}}>
            {currentNotes.map((n,i)=>{
              const p = NOTE_FRET_MAP[n];
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:C.muted}}>
                  <span style={{color:C.amber,fontWeight:700}}>{i+1}</span>
                  <span style={{fontFamily:"monospace",color:C.text}}>{n}</span>
                  {p&&<span style={{color:C.muted}}>({STRING_NAMES[p.str]} fr{p.fret})</span>}
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0",flexWrap:"wrap"}}>
        <MicPill listening={listening}/>
        {!active && !done && (
          <Btn onClick={start} variant="success">🎸 Play Along</Btn>
        )}
        {active && (
          <Btn onClick={stop} variant="danger">Stop</Btn>
        )}
        {done && (
          <>
            <span style={{fontSize:18,fontWeight:700,color:C.sage}}>{encouragement}</span>
            <Btn onClick={start} variant="secondary">Play Again</Btn>
          </>
        )}
        {active && !listening && (
          <span style={{fontSize:12,color:C.coral}}>Enable mic below first</span>
        )}
      </div>
    </div>
  );
}



const OPEN_NOTES = [
  {label:"Low E string",note:"E2"},{label:"A string",note:"A2"},{label:"D string",note:"D3"},
  {label:"G string",note:"G3"},{label:"B string",note:"B3"},{label:"High e string",note:"E4"},
];

function OpenStringPractice({ detected, onTarget }) {
  const [idx, setIdx] = useState(0);
  const [done, setDone] = useState({});

  useEffect(()=>{ onTarget(idx < OPEN_NOTES.length ? OPEN_NOTES[idx].note : null); },[idx]);

  useEffect(()=>{
    if (!detected || idx >= OPEN_NOTES.length) return;
    if (detected === OPEN_NOTES[idx].note){
      setDone(d=>({...d,[idx]:true}));
      setTimeout(()=>setIdx(i=>i+1), 700);
    }
  },[detected, idx]);

  return (
    <div style={{background:"#0E0E12",border:"1px dashed "+C.fret,borderRadius:12,padding:28,textAlign:"center",margin:"20px 0"}}>
      {idx < OPEN_NOTES.length ? (
        <>
          <div style={{fontSize:14,color:C.muted,marginBottom:6}}>Pluck this string:</div>
          <div style={{fontSize:44,fontWeight:800,color:C.amber,lineHeight:1,margin:"8px 0"}}>{OPEN_NOTES[idx].label}</div>
          <div style={{fontFamily:"monospace",fontSize:13,color:C.muted}}>Target: {OPEN_NOTES[idx].note}</div>
        </>
      ) : (
        <div style={{fontSize:18,fontWeight:600,color:C.sage}}>All 6 open strings done!</div>
      )}
      <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginTop:16}}>
        {OPEN_NOTES.map((s,i)=>(
          <div key={i} style={{padding:"3px 10px",borderRadius:6,fontFamily:"monospace",fontSize:12,
            border:"1px solid "+(done[i]?C.sage:i===idx?C.amber:C.fret),

          </div>
        ))}
      </div>
    </div>
  );
}

            <div style={{fontSize:11,color:C.amber,fontWeight:600,marginTop:6}}>{s.diff}</div>
          </div>
        ))}
      </div>
      {sel !== null && (
        <div>
          <SongPlayer parts={songs[sel].parts} detected={detected} listening={listening}/>
        </div>
      )}
    </div>
  );
}

function SongSearch({ detected, listening, onStartMic }) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [song, setSong] = useState(null);

  const GENRES = [...new Set(SONG_LIBRARY.map(s=>s.genre))];

  const doSearch = (q) => {
    setQuery(q);
    if (!q.trim()){ setResults([]); return; }
    const lower = q.toLowerCase();
    const matches = SONG_LIBRARY.filter(s=>
      s.title.toLowerCase().includes(lower) ||
      s.artist.toLowerCase().includes(lower) ||
      s.genre.toLowerCase().includes(lower) ||
      s.diff.toLowerCase().includes(lower)
    ).slice(0,50);
    setResults(matches);
  };

  const pick = (s) => { setSong(s); setResults([]); setQuery(s.title); };
  const reset = () => { setSong(null); setQuery(""); setResults([]); };

  const diffColor = (d) => d==="Beginner"?C.sage:d==="Intermediate"?C.amber:C.coral;
  const diffBg = (d) => d==="Beginner"?"rgba(107,143,110,0.15)":d==="Intermediate"?"rgba(212,168,71,0.15)":"rgba(224,92,75,0.15)";

  const FEATURED = ["Whiskey Glasses","Cowgirls","Last Night","Beautiful Crazy","Die A Happy Man","In Case You Didnt Know","Need You Now","7 Summers","Iris","Wonderwall"];

  return (
    <div style={{marginTop:20}}>
      <div style={{fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:C.muted,marginBottom:12}}>

        <input value={query} onChange={e=>doSearch(e.target.value)}

          style={{width:"100%",background:"#111115",border:"1px solid "+C.fret,borderRadius:8,

      {results.length > 0 && (

      {!query && !song && (
        <div style={{marginTop:12}}>
          <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Browse by difficulty:</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {["Beginner","Intermediate","Advanced"].map(d=>(
              <button key={d} onClick={()=>doSearch(d)}
                style={{padding:"4px 12px",borderRadius:16,fontSize:12,fontWeight:600,
                  cursor:"pointer",fontFamily:"sans-serif",
                  border:"1px solid "+(d==="Beginner"?C.sage:d==="Intermediate"?C.amber:C.coral),
                  background:"transparent",
                  color:d==="Beginner"?C.sage:d==="Intermediate"?C.amber:C.coral}}>

              </button>

          <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Browse by genre:</div>

                  cursor:"pointer",fontFamily:"sans-serif",border:"1px solid "+C.fret,
                  background:"transparent",color:C.muted}}>
                {g}
              </button>
            ))}
          </div>
          <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Popular picks:</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {FEATURED.map(t=>{

              return (

                    {ch}

                {song.capo > 0 && (
                  <span style={{padding:"2px 9px",borderRadius:10,fontSize:12,fontWeight:600,
                    background:"rgba(212,168,71,0.12)",color:C.amber,border:"1px solid rgba(212,168,71,0.3)"}}>
                    Capo {song.capo}

                )}
              </div>
            </div>
            <div style={{padding:"4px 10px",borderRadius:6,fontSize:12,fontWeight:600,
              flexShrink:0,background:diffBg(song.diff),color:diffColor(song.diff)}}>
              {song.diff}
            </div>
          </div>
          {song.tips && <Tip>Tip: {song.tips}</Tip>}

              style={{fontSize:13,color:C.muted,background:"none",border:"none",cursor:"pointer",

function LessonBody({ id, detected, onTarget, listening, onStartMic }) {
  if (id === 0) return (
    <div style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75}}>
      <p>Before you play a single note, get your posture right. Good posture prevents pain and speeds up progress.</p>
      <Tip>Sit with the guitar waist on your right leg. Back straight, neck angled slightly up. Thumb behind the neck, fingers curling over the fretboard.</Tip>
      <p>Your strumming hand hovers over the soundhole. For now use your thumb, sweeping downward across the strings.</p>
      <div style={{height:1,background:C.fret,margin:"20px 0"}}/>
      <p style={{fontSize:14,color:C.muted}}>Strings thick to thin: <strong style={{color:C.text}}>E A D G B e</strong> - remember with "Elephants And Donkeys Grow Big Ears."</p>
    </div>
  );
  if (id === 1) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:14}}>Tab shows you exactly where to put your fingers. No music theory needed. Each line is a string, numbers are frets.</p>
      <div style={{background:"#111115",borderRadius:10,padding:"18px 22px",border:"1px solid "+C.fret,overflowX:"auto"}}>
        {[
          {s:"e",v:["--","0","--","--","--","3","--"]},
          {s:"B",v:["--","--","0","--","--","3","--"]},
          {s:"G",v:["--","--","--","0","--","0","--"]},
          {s:"D",v:["--","--","--","--","--","0","--"]},
          {s:"A",v:["--","--","--","--","--","2","--"]},
          {s:"E",v:["0","--","--","--","--","3","--"]},
        ].map(({s,v})=>(
          <div key={s} style={{display:"flex",alignItems:"center",height:26}}>
            <span style={{fontFamily:"monospace",fontSize:13,fontWeight:600,color:C.amber,width:22}}>{s}</span>
            <span style={{fontFamily:"monospace",fontSize:13,color:C.string,marginRight:4}}>|</span>
            {v.map((val,i)=>(
              <span key={i} style={{fontFamily:"monospace",fontSize:14,width:22,textAlign:"center",
                color:val==="--"?C.string:i>=5?C.amber:C.text,fontWeight:val!=="--"?600:400}}>
                {val}
              </span>
            ))}
          </div>
        ))}
      </div>
      <Tip>Read left to right. 0 = open string. 2 = press 2nd fret. Numbers stacked vertically = chord.</Tip>
    </div>
  );
  if (id === 2) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:4}}>Start with open strings. Enable the mic and the app confirms each note as you pluck.</p>
      <OpenStringPractice detected={detected} onTarget={onTarget}/>
      <Tip>Press just behind the fret wire, not on top of it.</Tip>
    </div>
  );
  if (id === 3) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:14}}>Em is the easiest chord on guitar. Only 2 fingers. Am uses 3 fingers in a similar shape.</p>
      <div style={{display:"flex",gap:20,flexWrap:"wrap",margin:"16px 0"}}>
        <ChordDiagram name="Em"/><ChordDiagram name="Am"/>
      </div>
      <Tip>Em: middle finger 2nd fret A string, ring finger 2nd fret D string. Strum all 6 strings.</Tip>
    </div>
  );
  if (id === 4) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:14}}>G, C, and D unlock hundreds of songs. Together with Em and Am you have most of what you need.</p>
      <div style={{display:"flex",gap:20,flexWrap:"wrap",margin:"16px 0"}}>
        <ChordDiagram name="G"/><ChordDiagram name="C"/><ChordDiagram name="D"/>
      </div>
      <Tip>Classic progression: G - D - Em - C. Drill the transitions slowly, accuracy before speed.</Tip>
    </div>
  );
  if (id === 5) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:4}}>You know enough to play real songs. Pick one and play along!</p>
      <PlayAlong detected={detected} listening={listening}/>
    </div>
  );
  if (id === 6) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75}}>You made it through the basics. Here is what to work on next:</p>
      <Tip>Practice 15 minutes every day. Beats a 2-hour session once a week.</Tip>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75}}>
        <strong style={{color:C.text}}>Weeks 1-2:</strong> Drill chord switches until automatic.<br/>
        <strong style={{color:C.text}}>Weeks 3-4:</strong> Try bar chords. F and Bm are tough but worth it.<br/>
        <strong style={{color:C.text}}>Month 2:</strong> Fingerpicking. Arpeggios sound beautiful.
      </p>
      <div style={{marginTop:20,padding:20,background:"#0E0E12",borderRadius:12,
        border:"1px dashed "+C.amber,textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:8}}>Search</div>
        <div style={{fontWeight:600,fontSize:15,marginBottom:4}}>Ready to play your favourite songs?</div>
        <div style={{fontSize:13,color:C.muted}}>Lesson 8 lets you search 32 songs and play with mic feedback.</div>
      </div>
    </div>
  );
  if (id === 7) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:4}}>Search any song from our library. Tab loads instantly with mic play-along.</p>
      <SongSearch detected={detected} listening={listening} onStartMic={onStartMic}/>
    </div>
  );
  return null;
}

function MicBar({ note, hz, feedback, listening, onToggle }) {
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,
      background:"rgba(26,26,31,0.97)",backdropFilter:"blur(12px)",
      borderTop:"1px solid "+C.fret,padding:"14px 28px",
      display:"flex",alignItems:"center",gap:16,zIndex:100}}>
      <button onClick={onToggle}
        style={{width:46,height:46,borderRadius:"50%",
          border:"2px solid "+(listening?C.coral:C.fret),
          background:listening?"rgba(224,92,75,0.15)":C.bg2,
          fontSize:20,cursor:"pointer",flexShrink:0,
          display:"flex",alignItems:"center",justifyContent:"center"}}>
        🎙️
      </button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:20,color:C.text,lineHeight:1}}>{note||"-"}</div>
        <div style={{fontFamily:"monospace",fontSize:11,color:C.muted,marginTop:2}}>{hz||"tap mic to start"}</div>
      </div>
      {feedback && (
        <div style={{padding:"5px 14px",borderRadius:18,fontSize:13,fontWeight:600,flexShrink:0,
          background:feedback==="correct"?"rgba(107,143,110,0.2)":"rgba(224,92,75,0.15)",
          color:feedback==="correct"?C.sage:C.coral,
          border:"1px solid "+(feedback==="correct"?C.sage:C.coral)}}>
          {feedback==="correct"?"Nice!":"Try again"}
        </div>
      )}
    </div>
  );
}

function App() {
  const [splash, setSplash] = useState(true);
  const [lesson, setLesson] = useState(0);
  const [listening, setListening] = useState(false);
  const [pitchNote, setPitchNote] = useState("");
  const [pitchHz, setPitchHz] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [target, setTarget] = useState(null);
  const [detected, setDetected] = useState(null);

  const ctxRef = useRef(null);
  const analyserRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const fbTimerRef = useRef(null);

  const stopMic = useCallback(()=>{
    if (streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (ctxRef.current) ctxRef.current.close();
    ctxRef.current=null; analyserRef.current=null; streamRef.current=null;
    setListening(false); setPitchNote(""); setPitchHz(""); setDetected(null);
  },[]);

  const startMic = useCallback(async()=>{
    if (listening){ stopMic(); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      ctx.createMediaStreamSource(stream).connect(analyser);
      streamRef.current=stream; ctxRef.current=ctx; analyserRef.current=analyser;
      setListening(true); setPitchHz("listening...");
      const buf = new Float32Array(analyser.fftSize);
      const loop = ()=>{
        rafRef.current = requestAnimationFrame(loop);
        analyser.getFloatTimeDomainData(buf);
        const freq = autoCorrelate(buf, ctx.sampleRate);
        if (freq > 0){
          const r = freqToNote(freq);
          if (r){
            setPitchNote(r.name);
            setPitchHz(Math.round(freq)+" Hz");
            setDetected(r.name);
          }
        }
      };
      loop();
    } catch(e){ setPitchHz("mic denied"); }
  },[listening, stopMic]);

  useEffect(()=>{
    if (!detected || !target) return;
    if (detected === target){
      if (fbTimerRef.current) return;
      setFeedback("correct");
      fbTimerRef.current = setTimeout(()=>{ setFeedback(null); fbTimerRef.current=null; }, 1200);
    }
  },[detected, target]);

  useEffect(()=>()=>stopMic(),[]);

  const go = (n)=>{ setLesson(n); setSplash(false); };
  const prog = Math.round((lesson+1)/LESSONS.length*100);

  const css = "*{box-sizing:border-box;margin:0;padding:0} body{background:#1A1A1F} input::placeholder{color:#9A9490} p+p{margin-top:10px}";

  if (splash) return (
    <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"sans-serif",display:"flex",flexDirection:"column"}}>
      <style>{css}</style>
      <div style={{padding:"18px 32px",borderBottom:"1px solid "+C.fret,fontWeight:800,fontSize:22}}>
        <span style={{color:C.amber}}>Guitar</span><span>Teacher</span>
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"32px 20px 80px"}}>
        <div style={{maxWidth:520,width:"100%",textAlign:"center"}}>
          <div style={{fontSize:50,marginBottom:14}}>🎸</div>
          <h1 style={{fontWeight:800,fontSize:34,lineHeight:1.15,marginBottom:12}}>
            Learn guitar, <span style={{color:C.amber}}>your way.</span>
          </h1>
          <p style={{fontSize:15,color:"#C8C5BE",lineHeight:1.7,maxWidth:400,margin:"0 auto 32px"}}>
            Start from the very beginning or jump straight to playing songs you love.
          </p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
            <button onClick={()=>go(0)}
              style={{background:C.bg2,border:"1px solid "+C.amber,borderRadius:14,padding:"22px 16px",
                cursor:"pointer",textAlign:"left",fontFamily:"sans-serif"}}>
              <div style={{fontSize:26,marginBottom:8}}>📖</div>
              <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:5}}>Start from basics</div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>Never played? We cover everything from holding the guitar to real songs.</div>
              <div style={{marginTop:12,fontSize:12,fontWeight:600,color:C.amber}}>7 lessons + free play</div>
            </button>
            <button onClick={()=>go(7)}
              style={{background:C.bg2,border:"1px solid "+C.fret,borderRadius:14,padding:"22px 16px",
                cursor:"pointer",textAlign:"left",fontFamily:"sans-serif"}}>
              <div style={{fontSize:26,marginBottom:8}}>🔍</div>
              <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:5}}>Search any song</div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>Know the basics? Search 32 songs and play with mic feedback.</div>
              <div style={{marginTop:12,fontSize:12,fontWeight:600,color:C.muted}}>Jump to lesson 8</div>
            </button>
          </div>
          <p style={{fontSize:12,color:C.muted}}>You can jump between lessons anytime using the nav.</p>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"sans-serif",overflowX:"hidden"}}>
      <style>{css}</style>
      <div style={{padding:"16px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+C.fret}}>
        <button onClick={()=>setSplash(true)}
          style={{fontWeight:800,fontSize:21,background:"none",border:"none",cursor:"pointer",color:C.text,padding:0,fontFamily:"sans-serif"}}>
          <span style={{color:C.amber}}>Guitar</span><span>Teacher</span>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:10,fontSize:12,color:C.muted}}>
          <span>{lesson+1}/{LESSONS.length}</span>
          <div style={{width:100,height:3,background:C.bg3,borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",background:C.amber,width:prog+"%",borderRadius:2,transition:"width 0.4s"}}/>
          </div>
        </div>
      </div>

      <div style={{maxWidth:820,margin:"0 auto",padding:"28px 20px 150px"}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:24}}>
          {LESSONS.map((l,i)=>(
            <button key={i} onClick={()=>setLesson(i)}
              style={{padding:"4px 12px",borderRadius:18,fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"sans-serif",
                border:"1px solid "+(i<lesson?C.sage:i===lesson?C.amber:C.fret),
                background:i===lesson?"rgba(212,168,71,0.08)":"transparent",
                color:i<lesson?C.sage:i===lesson?C.amber:C.muted}}>
              {i+1}. {i===7?"Song Search":l.title.split(":")[0]}
            </button>
          ))}
        </div>

        <div style={{background:C.bg2,borderRadius:14,border:"1px solid "+C.fret,padding:32,marginBottom:20}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:C.amber,marginBottom:8}}>
            {LESSONS[lesson].eyebrow}
          </div>
          <h1 style={{fontWeight:700,fontSize:26,lineHeight:1.2,marginBottom:18}}>{LESSONS[lesson].title}</h1>
          <LessonBody id={lesson} detected={detected} onTarget={setTarget} listening={listening} onStartMic={startMic}/>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:24}}>
            {lesson > 0 && <Btn onClick={()=>setLesson(l=>l-1)} variant="secondary">Back</Btn>}
            {LESSONS[lesson].next
              ? <Btn onClick={()=>setLesson(l=>l+1)}>{LESSONS[lesson].next}</Btn>
              : <div style={{color:C.amber,fontWeight:600,padding:"10px 0"}}>You are all done! Keep playing.</div>}
          </div>
        </div>
      </div>

      <MicBar note={pitchNote} hz={pitchHz} feedback={feedback} listening={listening} onToggle={startMic}/>
    </div>
  );
}
