const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

function freqToNote(freq) {
  if (freq < 60 || freq > 1200) return null;
  const midi = Math.round(12 * Math.log2(freq / 440) + 69);
  const name = NOTE_NAMES[midi % 12];
  const octave = Math.floor(midi / 12) - 1;
  const hz = 440 * Math.pow(2, (midi - 69) / 12);
  const cents = Math.round(1200 * Math.log2(freq / hz));
  return { name: name + octave, cents };
}

function autoCorrelate(buf, sr) {
  const N = buf.length, MAX = Math.floor(N / 2);
  let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i] * buf[i];
  if (Math.sqrt(rms / N) < 0.01) return -1;
  let best = -1, bestC = 0, lastC = 1;
  for (let o = 0; o < MAX; o++) {
    let c = 0;
    for (let i = 0; i < MAX; i++) c += Math.abs(buf[i] - buf[i + o]);
    c = 1 - c / MAX;
    if (c > 0.9 && c > lastC && c > bestC) { bestC = c; best = o; }
    lastC = c;
  }
  return best > 0 && bestC > 0.01 ? sr / best : -1;
}

function ChordDiagram({ name }) {
  const sh = CHORDS[name];
  if (!sh) return null;

  // Three columns left of nut:
  // col1=12 (string letter), col2=34 (open/muted symbol), nut at LEFT=60
  const NUM_FRETS=5, NS=6, W=320, H=210;
  const TOP=44, BOT=H-22, LEFT=60, RIGHT=W-10;
  const strGap=(BOT-TOP)/(NS-1);
  const fretGap=(RIGHT-LEFT)/NUM_FRETS;
  const STRING_LABELS=["E","A","D","G","B","e"];
  const COL_LABEL=12, COL_MARKER=36;

  return (
    <div style={{background:"#0A0A0E",borderRadius:10,padding:"10px 6px",
      border:"1px solid "+C.fret,marginBottom:8}}>
      <div style={{textAlign:"center",marginBottom:6,fontWeight:700,fontSize:15,color:C.amber}}>{name}</div>
      <svg width={W} height={H} style={{display:"block",margin:"0 auto"}}>
        {/* Nut */}
        <line x1={LEFT} y1={TOP-2} x2={LEFT} y2={BOT+2} stroke={C.text} strokeWidth={3}/>
        {/* Frets */}
        {Array.from({length:NUM_FRETS+1},(_,f)=>(
          <line key={f} x1={LEFT+f*fretGap} y1={TOP} x2={LEFT+f*fretGap} y2={BOT} stroke={C.fret} strokeWidth={1}/>
        ))}
        {/* Strings */}
        {Array.from({length:NS},(_,s)=>(
          <line key={s} x1={LEFT} y1={TOP+s*strGap} x2={RIGHT} y2={TOP+s*strGap}
            stroke={C.string} strokeWidth={s===0?2:s===5?0.8:1.2}/>
        ))}
        {/* Col 1: string name labels */}
        {STRING_LABELS.map((n,s)=>(
          <text key={s} x={COL_LABEL} y={TOP+s*strGap+4} textAnchor="middle"
            fontSize={11} fill={C.amber} fontFamily="monospace" fontWeight="700">{n}</text>
        ))}
        {/* Col 2: open or muted markers */}
        {Array.from({length:NS},(_,s)=>{
          const cy=TOP+s*strGap;
          const isOpen = sh.open.includes(s);
          const isMuted = sh.muted.includes(s);
          if(isOpen) return (
            <g key={s}>
              <circle cx={COL_MARKER} cy={cy} r={7} fill="none" stroke={C.sage} strokeWidth={2}/>
            </g>
          );
          if(isMuted) return (
            <g key={s}>
              <line x1={COL_MARKER-6} y1={cy-6} x2={COL_MARKER+6} y2={cy+6} stroke={C.coral} strokeWidth={2.5}/>
              <line x1={COL_MARKER+6} y1={cy-6} x2={COL_MARKER-6} y2={cy+6} stroke={C.coral} strokeWidth={2.5}/>
            </g>
          );
          return null;
        })}
        {/* Fret numbers */}
        {Array.from({length:NUM_FRETS},(_,f)=>(
          <text key={f} x={LEFT+(f+0.5)*fretGap} y={BOT+16} textAnchor="middle"
            fontSize={9} fill={C.muted} fontFamily="monospace">{f+1}</text>
        ))}
        {/* Fretted finger dots */}
        {sh.dots.map(({s,f,n},i)=>{
          const cx = LEFT+(f-0.5)*fretGap;
          const cy = TOP+s*strGap;
          return (
            <g key={i}>
              <circle cx={cx} cy={cy} r={14} fill="rgba(212,168,71,0.12)"/>
              <circle cx={cx} cy={cy} r={11} fill={C.amber}/>
              <text x={cx} y={cy+5} textAnchor="middle" fontSize={13}
                fill="#1A1A1F" fontWeight="900" fontFamily="monospace">{n}</text>
            </g>
          );
        })}
      </svg>
      <div style={{textAlign:"center",fontFamily:"monospace",fontSize:10,color:C.muted,marginTop:4}}>{sh.label}</div>
    </div>
  );
}


const NOTE_FRET_MAP = {
  "E2":{str:0,fret:0},"F2":{str:0,fret:1},"F#2":{str:0,fret:2},"G2":{str:0,fret:3},
  "G#2":{str:0,fret:4},"A2":{str:1,fret:0},"A#2":{str:1,fret:1},"Bb2":{str:1,fret:1},
  "B2":{str:1,fret:2},"C3":{str:1,fret:3},"C#3":{str:1,fret:4},"D3":{str:2,fret:0},
  "D#3":{str:2,fret:1},"E3":{str:2,fret:2},"F3":{str:2,fret:3},"F#3":{str:2,fret:4},
  "G3":{str:3,fret:0},"G#3":{str:3,fret:1},"A3":{str:3,fret:2},"A#3":{str:3,fret:3},

const ENCOURAGEMENTS = ["Great job!","You nailed it!","Awesome!","Nicely done!","Keep it up!","Sounding good!","That was perfect!","You rock!"];

function SongPlayer({ parts, detected, listening, onStartMic }) {
  const [partIdx, setPartIdx] = useState(0);
  const [active, setActive] = useState(false);
  const [noteIdx, setNoteIdx] = useState(0);
  const [dotStates, setDotStates] = useState({});
  const [done, setDone] = useState(false);
  const [encouragement, setEncouragement] = useState("");
  const timerRef = useRef(null);

  const allParts = parts || [];
  const currentPart = allParts[partIdx] || {};
  const currentNotes = currentPart.notes || [];

  // Build a flat sequence: [{partIdx, noteIdx, note}]
  const sequence = allParts.flatMap((p,pi)=>
    (p.notes||[]).map((note,ni)=>({pi, ni, note}))
  );

  const [seqIdx, setSeqIdx] = useState(0);

  const stop = useCallback(()=>{
    setActive(false);
    if(timerRef.current) clearTimeout(timerRef.current);
    setSeqIdx(0); setNoteIdx(0); setPartIdx(0);
    setDotStates({}); setDone(false); setEncouragement("");
  },[]);

  const advance = useCallback((si, seq)=>{
    if(si >= seq.length){
      setActive(false);
      setDone(true);
      setEncouragement(ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]);
      return;
    }
    const {pi, ni, note} = seq[si];
    setSeqIdx(si);
    setPartIdx(pi);
    setNoteIdx(ni);
    setDotStates(s=>({...s,[pi+"-"+ni]:"cur"}));
  },[]);

  const start = useCallback(()=>{
    stop();
    if(!listening && onStartMic) onStartMic();
    setTimeout(()=>{
      setActive(true);
      setDone(false);
      setDotStates({});
      advance(0, sequence);
    }, 300);
  },[sequence, stop, advance, listening, onStartMic]);

  useEffect(()=>{
    if(!active || !detected) return;
    const cur = sequence[seqIdx];
    if(!cur) return;
    if(detected === cur.note){
      if(timerRef.current) clearTimeout(timerRef.current);
      setDotStates(s=>({...s,[cur.pi+"-"+cur.ni]:"hit"}));
      setTimeout(()=>advance(seqIdx+1, sequence), 400);
    }
  },[detected, active, seqIdx, sequence, advance]);

  useEffect(()=>()=>{ if(timerRef.current) clearTimeout(timerRef.current); },[]);

  const NS=6, H=260;
  const TOP=44, BOT=H-24, LEFT=44;
  const strGap=(BOT-TOP)/(NS-1);

  const renderFretboard = (pIdx) => {
    const pNotes = (allParts[pIdx]||{}).notes||[];
    const N = pNotes.length || 1;
    const W = Math.max(320, LEFT + N*52 + 20);
    const noteX = (ni) => LEFT + ni*52 + 26;

    return (
      <div style={{overflowX:"auto"}}>
      <svg width={W} height={H} style={{display:"block",minWidth:W}}>
        {/* Strings */}
        {Array.from({length:NS},(_,s)=>(
          <line key={s} x1={LEFT-20} y1={TOP+s*strGap} x2={W-10} y2={TOP+s*strGap}
            stroke={C.string} strokeWidth={s===0?2:s===5?0.8:1.2}/>
        ))}
        {/* String labels */}
        {STRING_NAMES.map((n,s)=>(
          <text key={s} x={LEFT-26} y={TOP+s*strGap+4} textAnchor="middle"
            fontSize={10} fill={C.amber} fontFamily="monospace" fontWeight="600">{n}</text>
        ))}
        {/* Vertical beat lines */}
        {pNotes.map((_,ni)=>(
          <line key={ni} x1={noteX(ni)} y1={TOP-8} x2={noteX(ni)} y2={BOT+8}
            stroke={C.fret} strokeWidth={1} opacity={0.3}/>
        ))}
        {/* Notes - left to right timeline */}
        {pNotes.map((note,ni)=>{
          const p = NOTE_FRET_MAP[note];
          if(!p) return null;
          const isOpen = p.fret===0;
          const cx = noteX(ni);
          const cy = TOP+p.str*strGap;
          const stateKey = pIdx+"-"+ni;
          const state = dotStates[stateKey];
          const isCur = active && state==="cur";
          const isHit = state==="hit";
          const isMiss = state==="miss";
          const fill = isHit?C.sage:isMiss?C.coral:C.amber;
          const opacity = isHit||isCur||isMiss?1:0.7;
          return (
            <g key={ni}>
              <circle cx={cx} cy={cy} r={18} fill={isHit?"rgba(107,143,110,0.15)":isCur?"rgba(212,168,71,0.25)":"rgba(212,168,71,0.1)"}/>
              <circle cx={cx} cy={cy} r={14}
                fill={isOpen?(isHit?C.sage:isCur?C.amber:"transparent"):fill}
                stroke={isOpen?(isHit?C.sage:isCur?C.amber:C.amber):"none"}
                strokeWidth={isOpen?2.5:0}
                opacity={opacity}/>
              {!isOpen && (
                <text x={cx} y={cy+5} textAnchor="middle" fontSize={13}
                  fill="#1A1A1F" fontWeight="900" fontFamily="monospace">
                  {p.fret}
                </text>
              )}
              {/* Fret label above strings area */}
              <text x={cx} y={TOP-6} textAnchor="middle" fontSize={9}
                fill={isCur?C.amber:C.muted} fontFamily="monospace">
                {isOpen?"open":("fr"+p.fret)}
              </text>
              {isCur && (
                <text x={cx} y={TOP-16} textAnchor="middle" fontSize={20}>🎸</text>
              )}
            </g>
          );
        })}
      </svg>
      </div>
    );
  };

  return (
    <div style={{marginBottom:16}}>
      {allParts.length > 1 && (
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {allParts.map((p,i)=>(
            <button key={i} onClick={()=>!active&&setPartIdx(i)}
              style={{padding:"3px 12px",borderRadius:14,fontSize:11,fontWeight:600,
                cursor:active?"default":"pointer",fontFamily:"sans-serif",
                border:"1px solid "+(i===partIdx?C.amber:C.fret),
                background:i===partIdx?"rgba(212,168,71,0.1)":"transparent",
                color:i===partIdx?C.amber:C.muted}}>
              {p.name}
            </button>
          ))}
        </div>
      )}
      {allParts.length===1 && (
        <div style={{fontSize:11,fontWeight:600,letterSpacing:"1.5px",textTransform:"uppercase",
          color:C.amber,marginBottom:10}}>{currentPart.name}</div>
      )}

      <div style={{background:"#0A0A0E",borderRadius:10,padding:"10px 6px",border:"1px solid "+(active?"rgba(212,168,71,0.3)":C.fret),overflowX:"auto",
        transition:"border-color 0.3s"}}>
        {renderFretboard(partIdx)}
        {currentNotes.length > 0 && (
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginTop:4,padding:"0 8px"}}>
            {currentNotes.map((n,i)=>{
              const p = NOTE_FRET_MAP[n];
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:C.muted}}>
                  {p&&p.fret!==0&&<span style={{color:C.amber,fontWeight:700}}>{i+1}</span>}
                  <span style={{fontFamily:"monospace",color:C.text}}>{n}</span>
                  {p&&<span style={{color:C.muted}}>{p.fret===0?"(open "+STRING_NAMES[p.str]+")":"("+STRING_NAMES[p.str]+" fr"+p.fret+")"}</span>}
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0",flexWrap:"wrap"}}>
        <MicPill listening={listening}/>

        {done && (
          <>

        {active && !listening && (
          <span style={{fontSize:12,color:C.coral}}>Enable mic below first</span>

    </div>
  );
}



const OPEN_NOTES = [
  {label:"Low E string",note:"E2"},{label:"A string",note:"A2"},{label:"D string",note:"D3"},
  {label:"G string",note:"G3"},{label:"B string",note:"B3"},{label:"High e string",note:"E4"},
];

function OpenStringPractice({ detected, onTarget, onComplete }) {
  const [idx, setIdx] = useState(0);
  const [heard, setHeard] = useState(false);
  const [doneSet, setDoneSet] = useState({});
  const [finished, setFinished] = useState(false);
  const [kudos] = useState(()=>{
    const msgs = ["Great job!", "You nailed it!", "Awesome work!", "Sounding good!", "Perfect!", "Nice playing!"];
    return msgs[Math.floor(Math.random()*msgs.length)];
  });

  const current = OPEN_NOTES[idx];

  useEffect(()=>{
    if (!finished) onTarget(current ? current.note : null);
  },[idx, finished]);

  useEffect(()=>{
    if (!detected || heard || finished || !current) return;
    if (detected === current.note) setHeard(true);
  },[detected, heard, finished, current]);

  const handleNext = () => {
    setDoneSet(d=>({...d,[idx]:true}));
    setHeard(false);
    if (idx + 1 >= OPEN_NOTES.length) {
      setFinished(true);
      onTarget(null);
      if (onComplete) onComplete();
    } else {
      setIdx(i=>i+1);
    }
  };

  const NUM_FRETS=5, NS=6, W=320, H=200;
  const TOP=44, BOT=H-24, LEFT=44, RIGHT=W-12;
  const strGap=(BOT-TOP)/(NS-1);
  const fretGap=(RIGHT-LEFT)/NUM_FRETS;
  const STRING_LABELS=["E","A","D","G","B","e"];

  return (
    <div style={{margin:"20px 0"}}>
      {!finished ? (
        <>
          <div style={{background:"#0A0A0E",borderRadius:12,padding:"16px 6px",border:"1px solid "+(heard?C.sage:C.fret),marginBottom:12,transition:"border-color 0.4s"}}>
            <div style={{textAlign:"center",marginBottom:10}}>
              <div style={{fontSize:13,color:C.muted,marginBottom:4}}>Pluck this string:</div>
              <div style={{fontSize:32,fontWeight:800,color:heard?C.sage:C.amber,lineHeight:1,transition:"color 0.3s"}}>{current.label}</div>
              {!heard && <div style={{fontSize:12,color:C.muted,marginTop:4}}>Target: {current.note}</div>}
              {heard && <div style={{fontSize:13,color:C.sage,fontWeight:600,marginTop:4}}>Heard it!</div>}
            </div>
            <svg width={W} height={H} style={{display:"block",margin:"0 auto"}}>
              <line x1={LEFT} y1={TOP-2} x2={LEFT} y2={BOT+2} stroke={C.text} strokeWidth={3}/>
              {Array.from({length:NUM_FRETS+1},(_,f)=>(
                <line key={f} x1={LEFT+f*fretGap} y1={TOP} x2={LEFT+f*fretGap} y2={BOT} stroke={C.fret} strokeWidth={1}/>
              ))}
              {Array.from({length:NS},(_,s)=>{
                const isTarget = s === current.note && false;
                const strIdx = NS-1-s;
                const targetStrIdx = OPEN_NOTES.indexOf(current);
                const isHighlighted = s === idx;
                return (
                  <g key={s}>
                    {isHighlighted && (
                      <rect x={LEFT} y={TOP+s*strGap-8} width={RIGHT-LEFT} height={16}
                        fill={heard?"rgba(107,143,110,0.12)":"rgba(212,168,71,0.08)"} rx={4}/>
                    )}
                    <line x1={LEFT} y1={TOP+s*strGap} x2={RIGHT} y2={TOP+s*strGap}
                      stroke={isHighlighted?(heard?C.sage:C.amber):C.string}
                      strokeWidth={isHighlighted?(heard?3:2.5):(s===0?0.8:s===5?2:1.2)}
                      style={{filter:isHighlighted?("drop-shadow(0 0 4px "+(heard?C.sage:C.amber)+")"):"none"}}/>
                    <text x={LEFT-10} y={TOP+s*strGap+4} textAnchor="middle"
                      fontSize={10} fill={isHighlighted?(heard?C.sage:C.amber):C.amber}
                      fontFamily="monospace" fontWeight={isHighlighted?"800":"400"}>
                      {STRING_LABELS[s]}
                    </text>
                    {doneSet[s] && (
                      <text x={RIGHT+10} y={TOP+s*strGap+4} textAnchor="middle"
                        fontSize={12} fill={C.sage}>✓</text>
                    )}
                  </g>
                );
              })}
              {Array.from({length:NUM_FRETS},(_,f)=>(
                <text key={f} x={LEFT+(f+0.5)*fretGap} y={BOT+16} textAnchor="middle"
                  fontSize={9} fill={C.muted} fontFamily="monospace">{f+1}</text>
              ))}
            </svg>
          </div>

          {heard && (
            <button onClick={handleNext}
              style={{width:"100%",padding:"13px",borderRadius:10,border:"2px solid "+C.sage,
                background:C.sage,color:"#fff",fontFamily:"sans-serif",fontSize:15,
                fontWeight:700,cursor:"pointer",marginBottom:8}}>
              {idx + 1 >= OPEN_NOTES.length ? "All done! See how I did" : "Next string →"}
            </button>
          )}

          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginTop:8}}>
            {OPEN_NOTES.map((s,i)=>(
              <div key={i} style={{padding:"3px 10px",borderRadius:6,fontFamily:"monospace",fontSize:12,
                border:"1px solid "+(doneSet[i]?C.sage:i===idx?C.amber:C.fret),
                color:doneSet[i]?C.sage:i===idx?C.amber:C.muted,
                background:doneSet[i]?"rgba(107,143,110,0.1)":i===idx?"rgba(212,168,71,0.1)":"transparent"}}>
                {doneSet[i]?"✓":s.note}
              </div>
            ))}
          </div>
        </>
      ) : (
        <div style={{background:"#0A0A0E",borderRadius:12,padding:28,border:"1px solid "+C.sage,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>🎸</div>
          <div style={{fontSize:22,fontWeight:800,color:C.sage,marginBottom:8}}>{kudos}</div>
          <div style={{fontSize:14,color:C.muted}}>You just played all 6 open strings. Click Next to continue.</div>
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginTop:16}}>
            {OPEN_NOTES.map((s,i)=>(
              <div key={i} style={{padding:"3px 10px",borderRadius:6,fontFamily:"monospace",fontSize:12,
                border:"1px solid "+C.sage,color:C.sage,background:"rgba(107,143,110,0.1)"}}>✓</div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ChordPractice({ chords, detected, onTarget }) {
  const CHORD_ROOTS = {Em:"E2", Am:"A2", G:"G2", C:"C3", D:"D3"};
  const KUDOS = ["Sounds good!","Nice strum!","That sounds right!","Great job!","Keep it up!","Well done!"];
  const [activeChord, setActiveChord] = useState(null);
  const [heard, setHeard] = useState({});
  const [kudos, setKudos] = useState({});

  useEffect(()=>{
    if (activeChord) onTarget(CHORD_ROOTS[activeChord]);
    else onTarget(null);
  },[activeChord]);

  useEffect(()=>{
    if (!detected || !activeChord || heard[activeChord]) return;
    const root = CHORD_ROOTS[activeChord];
    if (detected === root) {
      setHeard(h=>({...h,[activeChord]:true}));
      setKudos(k=>({...k,[activeChord]:KUDOS[Math.floor(Math.random()*KUDOS.length)]}));
    }
  },[detected, activeChord, heard]);

  return (
    <div>
      <div style={{fontSize:12,color:C.muted,marginBottom:10}}>
        Tap a chord to practice it, then strum on your guitar:
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {chords.map(name=>(
          <button key={name} onClick={()=>setActiveChord(activeChord===name?null:name)}
            style={{padding:"6px 16px",borderRadius:20,fontFamily:"sans-serif",fontSize:13,
              fontWeight:600,cursor:"pointer",
              border:"1px solid "+(heard[name]?C.sage:activeChord===name?C.amber:C.fret),
              background:heard[name]?"rgba(107,143,110,0.15)":activeChord===name?"rgba(212,168,71,0.1)":"transparent",
              color:heard[name]?C.sage:activeChord===name?C.amber:C.muted}}>
            {heard[name]?"✓ ":""}{name}
          </button>
        ))}
      </div>
      {activeChord && (
        <div style={{marginBottom:12}}>
          <ChordDiagram name={activeChord}/>
          <div style={{marginTop:10,padding:"10px 14px",borderRadius:8,
            background:heard[activeChord]?"rgba(107,143,110,0.12)":"rgba(212,168,71,0.06)",
            border:"1px solid "+(heard[activeChord]?C.sage:"rgba(212,168,71,0.2)"),
            fontSize:13,color:heard[activeChord]?C.sage:C.muted,textAlign:"center"}}>
            {heard[activeChord]
              ? <span style={{fontWeight:700,fontSize:15}}>🎸 {kudos[activeChord]}</span>
              : <span>Strum the {activeChord} chord - listening for the root note ({CHORD_ROOTS[activeChord]})</span>}
          </div>
        </div>
      )}
    </div>
  );
}

            <line x1={LEFT} y1={TOP-2} x2={LEFT} y2={BOT+2} stroke={C.text} strokeWidth={3}/>
            {/* Fret lines */}
            {Array.from({length:NUM_FRETS+1},(_,f)=>(
              <line key={f} x1={LEFT+f*fretGap} y1={TOP} x2={LEFT+f*fretGap} y2={BOT} stroke={C.fret} strokeWidth={1}/>
            ))}
            {/* Strings */}
            {Array.from({length:NS},(_,s)=>(
              <line key={s} x1={LEFT} y1={TOP+s*strGap} x2={RIGHT} y2={TOP+s*strGap}
                stroke={C.string} strokeWidth={s===0?2:s===5?0.8:1.2}/>
            ))}
            {/* String name labels - col 1 */}
            {LABELS.map((n,s)=>(
              <text key={s} x={14} y={TOP+s*strGap+4} textAnchor="middle"
                fontSize={11} fill={C.amber} fontFamily="monospace" fontWeight="700">{n}</text>
            ))}
            {/* Open/muted markers - col 2 */}
            {markers.map(({s,type})=>{
              const cy=TOP+s*strGap, cx=38;
              if(type==="open") return (
                <g key={s}>
                  <circle cx={cx} cy={cy} r={8} fill="none" stroke={C.sage} strokeWidth={2}/>
                  <text x={cx} y={cy+4} textAnchor="middle" fontSize={9}
                    fill={C.sage} fontFamily="monospace" fontWeight="700">0</text>
                </g>
              );
              if(type==="muted") return (
                <g key={s}>
                  <line x1={cx-6} y1={cy-6} x2={cx+6} y2={cy+6} stroke={C.coral} strokeWidth={2.5}/>
                  <line x1={cx+6} y1={cy-6} x2={cx-6} y2={cy+6} stroke={C.coral} strokeWidth={2.5}/>
                </g>
              );
              return null;
            })}
            {/* Fret numbers */}
            {Array.from({length:NUM_FRETS},(_,f)=>(
              <text key={f} x={LEFT+(f+0.5)*fretGap} y={BOT+16} textAnchor="middle"
                fontSize={9} fill={C.muted} fontFamily="monospace">{f+1}</text>
            ))}
            {/* Fretted dots */}
            {[{s:0,f:3,n:"3"},{s:1,f:2,n:"2"},{s:4,f:2,n:"1"},{s:5,f:3,n:"4"}].map(({s,f,n},i)=>{
              const cx=LEFT+(f-0.5)*fretGap, cy=TOP+s*strGap;
              return (
                <g key={i}>
                  <circle cx={cx} cy={cy} r={14} fill="rgba(212,168,71,0.12)"/>
                  <circle cx={cx} cy={cy} r={11} fill={C.amber}/>
                  <text x={cx} y={cy+5} textAnchor="middle" fontSize={13}
                    fill="#1A1A1F" fontWeight="900" fontFamily="monospace">{n}</text>
                </g>
              );
            })}
          </svg>
        </div>
        <Tip>0 = open string (no fingers). A number = press that fret. X = don't play that string.</Tip>
        <p style={{color:"#C8C5BE",fontSize:14,lineHeight:1.7,marginTop:12}}>
          The top string (E) is the thickest - closest to you when holding the guitar. The bottom (e) is the thinnest.
        </p>
      </div>
    );
  }
  const [stringsComplete, setStringsComplete] = useState(false);
  if (id === 2) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:4}}>Pluck each open string one at a time. The app listens and lights it up green when it hears you - then tap Next to move on.</p>
      <OpenStringPractice detected={detected} onTarget={onTarget} onComplete={()=>setStringsComplete(true)}/>
      {!stringsComplete && <Tip>Open strings means no fingers on the frets - just pluck the string.</Tip>}
      {stringsComplete && (
        <div style={{display:"flex",gap:10,marginTop:16}}>
          <Btn onClick={()=>setStringsComplete(false)} variant="secondary">Start over</Btn>
        </div>
      )}
    </div>
  );
  if (id === 3) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:14}}>Em is the easiest chord on guitar. Only 2 fingers. Am uses 3 fingers in a similar shape. Tap one to see the fingering, then strum it - the mic will confirm!</p>
      <ChordPractice chords={["Em","Am"]} detected={detected} onTarget={onTarget}/>
      <Tip>Em: middle finger 2nd fret A string, ring finger 2nd fret D string. Strum all 6 strings.</Tip>
    </div>
  );
  if (id === 4) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:14}}>G, C, and D unlock hundreds of songs. Tap each chord to see the fingering and strum it - the mic will confirm when it hears you!</p>
      <ChordPractice chords={["G","C","D"]} detected={detected} onTarget={onTarget}/>
      <Tip>Classic progression: G - D - Em - C. Drill the transitions slowly, accuracy before speed.</Tip>
    </div>
  );
  if (id === 5) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:4}}>You know enough to play real songs. Pick one and play along!</p>
      <PlayAlong detected={detected} listening={listening}/>
    </div>
  );
  if (id === 6) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75}}>You made it through the basics. Here is what to work on next:</p>
      <Tip>Practice 15 minutes every day. Beats a 2-hour session once a week.</Tip>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75}}>
        <strong style={{color:C.text}}>Weeks 1-2:</strong> Drill chord switches until automatic.<br/>
        <strong style={{color:C.text}}>Weeks 3-4:</strong> Try bar chords. F and Bm are tough but worth it.<br/>
        <strong style={{color:C.text}}>Month 2:</strong> Fingerpicking. Arpeggios sound beautiful.
      </p>
      <div style={{marginTop:20,padding:20,background:"#0E0E12",borderRadius:12,
        border:"1px dashed "+C.amber,textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:8}}>Search</div>
        <div style={{fontWeight:600,fontSize:15,marginBottom:4}}>Ready to play your favourite songs?</div>
        <div style={{fontSize:13,color:C.muted}}>Lesson 8 lets you search 32 songs and play with mic feedback.</div>
      </div>
    </div>
  );
  if (id === 7) return (
    <div>
      <p style={{color:"#C8C5BE",fontSize:15,lineHeight:1.75,marginBottom:4}}>Search any song from our library. Tab loads instantly with mic play-along.</p>
      <SongSearch detected={detected} listening={listening} onStartMic={onStartMic}/>
    </div>
  );
  return null;
}

function GuitarTuner({ onBack, onGoTuner, onGoBasics, onGoSongSearch }) {
  const [listening, setListening] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [detectedNote, setDetectedNote] = useState("");
  const [detectedFreq, setDetectedFreq] = useState(0);
  const [cents, setCents] = useState(0);
  const [closestString, setClosestString] = useState(null);
  const [lockedString, setLockedString] = useState(null);
  const [tuned, setTuned] = useState({});
  const [currentStringIdx, setCurrentStringIdx] = useState(0);
  const [readyToMark, setReadyToMark] = useState(false);
  const ctxRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);

  const stopMic = useCallback(()=>{
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    if(ctxRef.current) ctxRef.current.close();
    ctxRef.current=null; streamRef.current=null;
    setListening(false); setDetectedNote(""); setDetectedFreq(0); setCents(0); setClosestString(null);
  },[]);

  const startMic = useCallback(async()=>{
    if(listening){ stopMic(); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 4096;
      ctx.createMediaStreamSource(stream).connect(analyser);
      ctxRef.current=ctx; streamRef.current=stream;
      setListening(true);
      const buf = new Float32Array(analyser.fftSize);
      const loop = ()=>{
        rafRef.current = requestAnimationFrame(loop);
        analyser.getFloatTimeDomainData(buf);
        const freq = autoCorrelate(buf, ctx.sampleRate);
        if(freq > 60 && freq < 1200){
          const midi = Math.round(12*Math.log2(freq/440)+69);
          const name = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"][midi%12];
          const oct = Math.floor(midi/12)-1;
          const exactHz = 440*Math.pow(2,(midi-69)/12);
          const c = Math.round(1200*Math.log2(freq/exactHz));
          setDetectedNote(name+oct);
          setDetectedFreq(Math.round(freq*10)/10);
          setCents(c);
          const closest = lockedString || OPEN_STRINGS.reduce((best,s)=>{
            const diff = Math.abs(freq - s.freq);
            return diff < Math.abs(freq - best.freq) ? s : best;
          }, OPEN_STRINGS[0]);
          setClosestString(closest);
        }
      };
      loop();
    } catch(e){ alert("Mic access denied. Please allow microphone access and try again."); }
  },[listening, stopMic]);

  useEffect(()=>()=>stopMic(),[]);

  const inTune = Math.abs(cents) <= 8;
  useEffect(()=>{ if(inTune && detectedFreq>0 && !tuned[activeString?.note]) setReadyToMark(true); },[inTune, detectedFreq]);
  const slightlyOff = Math.abs(cents) <= 20;
  const needleAngle = Math.max(-45, Math.min(45, cents * 0.9));
  const needleColor = inTune ? C.sage : slightlyOff ? C.amber : C.coral;
  const tuneMsg = inTune ? "In tune!" : cents < 0 ? "Tune up" : "Tune down";
  const tuneMsgColor = inTune ? C.sage : slightlyOff ? C.amber : C.coral;
  const allTuned = Object.keys(tuned).length === OPEN_STRINGS.length;
  const activeString = lockedString || OPEN_STRINGS[currentStringIdx];

  return (
    <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"sans-serif",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"18px 32px",borderBottom:"1px solid "+C.fret,display:"flex",alignItems:"center",gap:16}}>
        <button onClick={onBack}
          style={{background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer",padding:0,lineHeight:1}}>
          ←
        </button>
        <div style={{fontWeight:800,fontSize:22}}>
          <span style={{color:C.amber}}>Guitar</span><span>Teacher</span>
          <span style={{fontWeight:600,fontSize:14,color:C.muted,marginLeft:8}}>/ Tuner</span>
        </div>
        <button onClick={()=>setMenuOpen(true)}
          style={{background:"none",border:"none",cursor:"pointer",padding:4,display:"flex",flexDirection:"column",gap:5}}>
          <div style={{width:22,height:2,background:C.muted,borderRadius:1}}/>
          <div style={{width:22,height:2,background:C.muted,borderRadius:1}}/>
          <div style={{width:22,height:2,background:C.muted,borderRadius:1}}/>
        </button>
      </div>
      {menuOpen && <HamburgerMenu
        onTuner={()=>{setMenuOpen(false);}}
        onBasics={()=>{setMenuOpen(false);onGoBasics();}}
        onSongSearch={()=>{setMenuOpen(false);onGoSongSearch();}}
        onClose={()=>setMenuOpen(false)}
      />}

      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px 20px 60px"}}>
        <div style={{maxWidth:480,width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:13,color:C.muted,marginBottom:6}}>Pluck any string and tune to the closest note</div>
          </div>

          {/* Needle meter */}
          <div style={{background:"#0A0A0E",borderRadius:16,padding:"28px 20px 20px",border:"1px solid "+C.fret,marginBottom:20,textAlign:"center"}}>
            <svg width={300} height={160} style={{display:"block",margin:"0 auto",overflow:"visible"}}>
              {/* Arc background */}
              <path d="M 30 140 A 120 120 0 0 1 270 140" fill="none" stroke={C.fret} strokeWidth={8} strokeLinecap="round"/>
              {/* Colored arc zones */}
              <path d="M 30 140 A 120 120 0 0 1 75 50" fill="none" stroke="rgba(224,92,75,0.3)" strokeWidth={8} strokeLinecap="round"/>
              <path d="M 75 50 A 120 120 0 0 1 118 22" fill="none" stroke="rgba(212,168,71,0.3)" strokeWidth={8} strokeLinecap="round"/>
              <path d="M 118 22 A 120 120 0 0 1 182 22" fill="none" stroke="rgba(107,143,110,0.5)" strokeWidth={10} strokeLinecap="round"/>
              <path d="M 182 22 A 120 120 0 0 1 225 50" fill="none" stroke="rgba(212,168,71,0.3)" strokeWidth={8} strokeLinecap="round"/>
              <path d="M 225 50 A 120 120 0 0 1 270 140" fill="none" stroke="rgba(224,92,75,0.3)" strokeWidth={8} strokeLinecap="round"/>
              {/* Center tick */}
              <line x1={150} y1={25} x2={150} y2={40} stroke={C.sage} strokeWidth={2}/>
              {/* Needle */}
              {detectedFreq > 0 && (
                <g transform={"rotate("+needleAngle+", 150, 140)"}>
                  <line x1={150} y1={140} x2={150} y2={35} stroke={needleColor} strokeWidth={2.5} strokeLinecap="round"/>
                  <circle cx={150} cy={140} r={6} fill={needleColor}/>
                </g>
              )}
              {/* Center dot when no signal */}
              {detectedFreq === 0 && (
                <circle cx={150} cy={140} r={5} fill={C.fret}/>
              )}
              {/* Labels */}
              <text x={18} y={155} fontSize={10} fill={C.muted} textAnchor="middle">-50</text>
              <text x={150} y={18} fontSize={10} fill={C.sage} textAnchor="middle">0</text>
              <text x={282} y={155} fontSize={10} fill={C.muted} textAnchor="middle">+50</text>
            </svg>

            {detectedFreq > 0 ? (
              <>
                <div style={{fontSize:48,fontWeight:800,color:needleColor,lineHeight:1,margin:"8px 0 4px"}}>{detectedNote}</div>
                <div style={{fontSize:13,color:C.muted,marginBottom:6}}>{detectedFreq} Hz</div>
                <div style={{fontSize:18,fontWeight:700,color:tuneMsgColor}}>{tuneMsg}</div>
                {!inTune && (
                  <div style={{fontSize:12,color:C.muted,marginTop:4}}>
                    {Math.abs(cents)} cents {cents < 0 ? "flat" : "sharp"}
                  </div>
                )}
              </>
            ) : (
              <div style={{fontSize:15,color:C.muted,marginTop:8}}>
                {listening ? "Pluck a string..." : "Tap the mic to start"}
              </div>
            )}
          </div>

          {/* String selector tabs */}
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {OPEN_STRINGS.map((s,i)=>{
              const isActive = activeString && activeString.note===s.note;
              const isDone = tuned[s.note];
              return (
                <button key={s.note} onClick={()=>{setLockedString(s);setCurrentStringIdx(i);setReadyToMark(false);}}
                  style={{flex:1,padding:"8px 4px",borderRadius:8,border:"1px solid "+(isDone?C.sage:isActive?C.amber:C.fret),
                    background:isDone?"rgba(107,143,110,0.15)":isActive?"rgba(212,168,71,0.1)":"transparent",
                    cursor:"pointer",fontFamily:"sans-serif",textAlign:"center",minWidth:44}}>
                  <div style={{fontSize:15,fontWeight:800,color:isDone?C.sage:isActive?C.amber:C.text}}>
                    {s.name==="Low E"?"E":s.name==="High e"?"e":s.name}
                  </div>
                  <div style={{fontSize:9,color:isDone?C.sage:C.muted,marginTop:1}}>{isDone?"✓":s.note}</div>
                </button>
              );
            })}
          </div>

          {/* Guitar string visual */}
          <div style={{background:"#0A0A0E",borderRadius:12,padding:"18px 16px",border:"1px solid "+(inTune&&detectedFreq>0?C.sage:C.fret),marginBottom:12,transition:"border-color 0.3s"}}>
            <div style={{fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"1px",
              color:C.muted,marginBottom:14,textAlign:"center"}}>
              {detectedFreq>0 ? (
                <span>Plucking <span style={{color:inTune?C.sage:C.amber,fontWeight:800}}>
                  {activeString.name} string
                </span> {inTune ? "- In tune!" : (cents<0?"- Tune up (too flat)":"- Tune down (too sharp)")}</span>
              ) : <span>Tap a string above, then pluck it on your guitar</span>}
            </div>
            <svg width="100%" viewBox="0 0 340 130" style={{display:"block"}}>
              {OPEN_STRINGS.map((s,i)=>{
                const isActive = activeString && activeString.note===s.note;
                const x1 = 20, x2 = 320;
                const y = 18 + i*19;
                const thickness = i===0?2.5:i===1?2.2:i===2?1.8:i===3?1.4:i===4?1.1:0.9;
                const stringCol = isActive?(inTune?C.sage:C.amber):"#5A5A6A";
                const glowOpacity = isActive ? 1 : 0;
                return (
                  <g key={s.note}>
                    {isActive && (
                      <line x1={x1} y1={y} x2={x2} y2={y}
                        stroke={inTune?C.sage:C.amber} strokeWidth={thickness+6} opacity={0.15}/>
                    )}
                    <line x1={x1} y1={y} x2={x2} y2={y}
                      stroke={stringCol} strokeWidth={thickness}
                      strokeLinecap="round"
                      style={{filter:isActive?("drop-shadow(0 0 4px "+(inTune?C.sage:C.amber)+")"):"none"}}/>
                    <text x={8} y={y+4} textAnchor="middle" fontSize={9}
                      fill={isActive?(inTune?C.sage:C.amber):C.muted}
                      fontFamily="monospace" fontWeight={isActive?"800":"400"}>
                      {s.name==="Low E"?"E":s.name==="High e"?"e":s.name}
                    </text>
                    <text x={332} y={y+4} textAnchor="middle" fontSize={9}
                      fill={isActive?(inTune?C.sage:C.amber):C.muted}
                      fontFamily="monospace" fontWeight={isActive?"800":"400"}>
                      {s.note}
                    </text>
                    {isActive && (
                      <>
                        <circle cx={160} cy={y} r={8} fill={inTune?C.sage:C.amber} opacity={0.9}/>
                        <text x={160} y={y+4} textAnchor="middle" fontSize={9}
                          fill="#1A1A1F" fontWeight="900" fontFamily="monospace">
                          {inTune?"✓":cents<0?"↑":"↓"}
                        </text>
                      </>
                    )}
                  </g>
                );
              })}
              <line x1={20} y1={10} x2={20} y2={120} stroke={C.muted} strokeWidth={3} strokeLinecap="round"/>
              <line x1={320} y1={10} x2={320} y2={120} stroke={C.fret} strokeWidth={1}/>
            </svg>
          </div>

          {/* Mark tuned + Next */}
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            {readyToMark && !tuned[activeString?.note] && (
              <button onClick={()=>{
                setTuned(t=>({...t,[activeString.note]:true}));
                setReadyToMark(false);
                const nextIdx = currentStringIdx+1 < OPEN_STRINGS.length ? currentStringIdx+1 : currentStringIdx;
                setCurrentStringIdx(nextIdx);
                setLockedString(nextIdx!==currentStringIdx ? OPEN_STRINGS[nextIdx] : lockedString);
              }}
                style={{flex:1,padding:"11px",borderRadius:10,border:"2px solid "+C.sage,
                  background:"rgba(107,143,110,0.1)",color:C.sage,fontFamily:"sans-serif",
                  fontSize:14,fontWeight:700,cursor:"pointer"}}>
                Mark as tuned - Next string
              </button>
            )}
            {allTuned && (
              <button onClick={onBack}
                style={{flex:1,padding:"11px",borderRadius:10,border:"2px solid "+C.sage,
                  background:C.sage,color:"#fff",fontFamily:"sans-serif",
                  fontSize:14,fontWeight:700,cursor:"pointer"}}>
                All tuned! Back to menu
              </button>
            )}
          </div>

          {/* Mic button */}
          <button onClick={startMic}
            style={{width:"100%",padding:"14px",borderRadius:12,border:"2px solid "+(listening?C.coral:C.amber),
              background:listening?"rgba(224,92,75,0.1)":"rgba(212,168,71,0.08)",
              color:listening?C.coral:C.amber,fontFamily:"sans-serif",fontSize:15,fontWeight:700,
              cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <span style={{fontSize:20}}>🎙️</span>
            {listening ? "Stop Listening" : "Start Listening"}
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [splash, setSplash] = useState(true);
  const [showTuner, setShowTuner] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [lesson, setLesson] = useState(0);
  const [listening, setListening] = useState(false);
  const [pitchNote, setPitchNote] = useState("");
  const [pitchHz, setPitchHz] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [target, setTarget] = useState(null);
  const [detected, setDetected] = useState(null);

  const ctxRef = useRef(null);
  const analyserRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const fbTimerRef = useRef(null);

  const stopMic = useCallback(()=>{
    if (streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (ctxRef.current) ctxRef.current.close();
    ctxRef.current=null; analyserRef.current=null; streamRef.current=null;
    setListening(false); setPitchNote(""); setPitchHz(""); setDetected(null);
  },[]);

  const startMic = useCallback(async()=>{
    if (listening){ stopMic(); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      ctx.createMediaStreamSource(stream).connect(analyser);
      streamRef.current=stream; ctxRef.current=ctx; analyserRef.current=analyser;
      setListening(true); setPitchHz("listening...");
      const buf = new Float32Array(analyser.fftSize);
      const loop = ()=>{
        rafRef.current = requestAnimationFrame(loop);
        analyser.getFloatTimeDomainData(buf);
        const freq = autoCorrelate(buf, ctx.sampleRate);
        if (freq > 0){
          const r = freqToNote(freq);
          if (r){
            setPitchNote(r.name);
            setPitchHz(Math.round(freq)+" Hz");
            setDetected(r.name);
          }
        }
      };
      loop();
    } catch(e){ setPitchHz("mic denied"); }
  },[listening, stopMic]);

  useEffect(()=>{
    if (!detected || !target) return;
    if (detected === target){
      if (fbTimerRef.current) return;
      setFeedback("correct");
      fbTimerRef.current = setTimeout(()=>{ setFeedback(null); fbTimerRef.current=null; }, 1200);
    }
  },[detected, target]);

  useEffect(()=>()=>stopMic(),[]);

  const go = (n)=>{ setLesson(n); setSplash(false); };
  const prog = Math.round((lesson+1)/LESSONS.length*100);

  const css = "*{box-sizing:border-box;margin:0;padding:0} body{background:#1A1A1F} input::placeholder{color:#9A9490} p+p{margin-top:10px}";

  if (showTuner) return <GuitarTuner
    onBack={()=>setShowTuner(false)}
    onGoTuner={()=>{}}
    onGoBasics={()=>{setShowTuner(false);setSplash(false);setLesson(0);}}
    onGoSongSearch={()=>{setShowTuner(false);setSplash(false);setLesson(7);}}
  />;

  if (splash) return (
    <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"sans-serif",display:"flex",flexDirection:"column"}}>
      <style>{css}</style>
      <div style={{padding:"18px 32px",borderBottom:"1px solid "+C.fret,fontWeight:800,fontSize:22,
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><span style={{color:C.amber}}>Guitar</span><span>Teacher</span></div>
        <button onClick={()=>setMenuOpen(true)}
          style={{background:"none",border:"none",cursor:"pointer",padding:4,display:"flex",flexDirection:"column",gap:5}}>
          <div style={{width:22,height:2,background:C.muted,borderRadius:1}}/>
          <div style={{width:22,height:2,background:C.muted,borderRadius:1}}/>
          <div style={{width:22,height:2,background:C.muted,borderRadius:1}}/>
        </button>
      </div>
      {menuOpen && <HamburgerMenu
        onTuner={()=>{setMenuOpen(false);setShowTuner(true);setSplash(false);}}
        onBasics={()=>{setMenuOpen(false);setShowTuner(false);setSplash(false);go(0);}}
        onSongSearch={()=>{setMenuOpen(false);setShowTuner(false);setSplash(false);go(7);}}
        onClose={()=>setMenuOpen(false)}
      />}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px 60px"}}>
        <div style={{maxWidth:480,width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:36}}>
            <div style={{fontSize:56,lineHeight:1,marginBottom:16}}>🎸</div>
            <h1 style={{fontWeight:800,fontSize:32,lineHeight:1.2,marginBottom:10}}>
              Learn guitar, <span style={{color:C.amber}}>your way.</span>
            </h1>
            <p style={{fontSize:14,color:C.muted,lineHeight:1.7}}>
              Pick where you want to start.
            </p>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {/* Tune your guitar */}
            <button onClick={()=>setShowTuner(true)}
              style={{background:C.bg2,border:"1px solid "+C.sage,borderRadius:16,padding:"20px 22px",
                cursor:"pointer",textAlign:"left",fontFamily:"sans-serif",
                display:"flex",alignItems:"center",gap:18}}>
              <div style={{fontSize:36,flexShrink:0}}>🎵</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:3}}>Tune your guitar</div>
                <div style={{fontSize:13,color:C.muted,lineHeight:1.5}}>Get in tune before you play. Pluck a string and the tuner guides you.</div>
              </div>
              <div style={{color:C.sage,fontSize:20,flexShrink:0}}>›</div>
            </button>

            {/* Start from basics */}
            <button onClick={()=>go(0)}
              style={{background:C.bg2,border:"1px solid "+C.amber,borderRadius:16,padding:"20px 22px",
                cursor:"pointer",textAlign:"left",fontFamily:"sans-serif",
                display:"flex",alignItems:"center",gap:18}}>
              <div style={{fontSize:36,flexShrink:0}}>📖</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:3}}>Start from basics</div>
                <div style={{fontSize:13,color:C.muted,lineHeight:1.5}}>New to guitar? Learn step by step from the very beginning.</div>
              </div>
              <div style={{color:C.amber,fontSize:20,flexShrink:0}}>›</div>
            </button>

            {/* Search any song */}
            <button onClick={()=>go(7)}
              style={{background:C.bg2,border:"1px solid "+C.fret,borderRadius:16,padding:"20px 22px",
                cursor:"pointer",textAlign:"left",fontFamily:"sans-serif",
                display:"flex",alignItems:"center",gap:18}}>
              <div style={{fontSize:36,flexShrink:0}}>🎵</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:3}}>Search any song</div>
                <div style={{fontSize:13,color:C.muted,lineHeight:1.5}}>Already know the basics? Find a song and play along with the mic.</div>
              </div>
              <div style={{color:C.muted,fontSize:20,flexShrink:0}}>›</div>
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"sans-serif",overflowX:"hidden"}}>
      <style>{css}</style>
      <div style={{padding:"16px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+C.fret}}>
        <button onClick={()=>setSplash(true)}
          style={{fontWeight:800,fontSize:21,background:"none",border:"none",cursor:"pointer",color:C.text,padding:0,fontFamily:"sans-serif"}}>
          <span style={{color:C.amber}}>Guitar</span><span>Teacher</span>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.muted}}>
            <span>{lesson+1}/{LESSONS.length}</span>
            <div style={{width:80,height:3,background:C.bg3,borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",background:C.amber,width:prog+"%",borderRadius:2,transition:"width 0.4s"}}/>
            </div>
          </div>
          <button onClick={()=>setMenuOpen(true)}
            style={{background:"none",border:"none",cursor:"pointer",padding:4,display:"flex",flexDirection:"column",gap:5}}>
            <div style={{width:22,height:2,background:C.muted,borderRadius:1}}/>
            <div style={{width:22,height:2,background:C.muted,borderRadius:1}}/>
            <div style={{width:22,height:2,background:C.muted,borderRadius:1}}/>
          </button>
        </div>
      </div>

      {menuOpen && <HamburgerMenu
        onTuner={()=>{setMenuOpen(false);setShowTuner(true);setSplash(false);}}
        onBasics={()=>{setMenuOpen(false);setShowTuner(false);setSplash(false);setLesson(0);}}
        onSongSearch={()=>{setMenuOpen(false);setShowTuner(false);setSplash(false);setLesson(7);}}
        onClose={()=>setMenuOpen(false)}
      />}
      <div style={{maxWidth:820,margin:"0 auto",padding:"28px 20px 150px"}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:24}}>
          {LESSONS.map((l,i)=>(
            <button key={i} onClick={()=>setLesson(i)}
              style={{padding:"4px 12px",borderRadius:18,fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"sans-serif",
                border:"1px solid "+(i<lesson?C.sage:i===lesson?C.amber:C.fret),
                background:i===lesson?"rgba(212,168,71,0.08)":"transparent",
                color:i<lesson?C.sage:i===lesson?C.amber:C.muted}}>
              {i+1}. {i===7?"Song Search":l.title.split(":")[0]}
            </button>
          ))}
        </div>

        <div style={{background:C.bg2,borderRadius:14,border:"1px solid "+C.fret,padding:32,marginBottom:20}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:C.amber,marginBottom:8}}>
            {LESSONS[lesson].eyebrow}
          </div>
          <h1 style={{fontWeight:700,fontSize:26,lineHeight:1.2,marginBottom:18}}>{LESSONS[lesson].title}</h1>
          <LessonBody id={lesson} detected={detected} onTarget={setTarget} listening={listening} onStartMic={startMic}/>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:24}}>
            {lesson > 0 && <Btn onClick={()=>setLesson(l=>l-1)} variant="secondary">Back</Btn>}
            {LESSONS[lesson].next
              ? <Btn onClick={()=>setLesson(l=>l+1)}>{LESSONS[lesson].next}</Btn>
              : null}
          </div>
        </div>
      </div>

      <MicBar note={pitchNote} hz={pitchHz} feedback={feedback} listening={listening} onToggle={startMic}/>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
